services:
  product-db:
    image: postgres:16-alpine
    container_name: product-catalog-db

    environment:
      POSTGRES_DB: product_catalog
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "15432:5432"

    volumes:
      - product_catalog_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d product_catalog"]
      interval: 5s
      timeout: 5s
      retries: 10


  product-db-test:
    image: postgres:16-alpine
    container_name: product-catalog-test-db

    environment:
      POSTGRES_DB: product_catalog_test
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "15433:5432"

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d product_catalog_test"]
      interval: 5s
      timeout: 5s
      retries: 10


  product-api:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: product-catalog-api

    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__PostgreSql: Host=product-db;Port=5432;Database=product_catalog;Username=postgres;Password=postgres
      Services__Storage__BaseUrl: http://host.docker.internal:5000/

    ports:
      - "8080:8080"

    depends_on:
      product-db:
        condition: service_healthy

    restart: unless-stopped


volumes:
  product_catalog_data: